- name: Install required packages for Blobfuse (Ubuntu/Debian)
  ansible.builtin.apt:
    name:
      - blobfuse
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Ensure the directory for mounting Azure Blob storage exists
  ansible.builtin.file:
    path: /mnt/azureblob
    state: directory
    mode: '0750'
  # This task will create the directory if it doesn't exist

- name: Ensure the tmp path for Blobfuse exists
  ansible.builtin.file:
    path: /mnt/resource/blobfusetmp
    state: directory
    mode: '0750'
  # This task ensures that the temporary path exists, which is required for blobfuse

