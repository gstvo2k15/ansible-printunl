---
- name: Install all pritunl requirements
  block:
    - name: Gather facts to get system's primary IP
      ansible.builtin.setup:
        gather_subset:
          - network

    - name: Get Pritunl setup key
      ansible.builtin.command:
        cmd: pritunl setup-key
      register: pritunl_key_output
      changed_when: false

    - name: Debug Pritunl setup key output
      ansible.builtin.debug:
        var: pritunl_key_output

    - name: Create Pritunl configuration file from template
      ansible.builtin.template:
        src: pritunl.conf.j2
        dest: /etc/pritunl.conf
        mode: '0644'
      when:
        - pritunl_key_output is defined
        - ansible_default_ipv4.address is defined

    - name: Create Pritunl Web configuration file from template
      ansible.builtin.template:
        src: pritunl-web.env.j2
        dest: /etc/pritunl-web.env
        mode: '0644'

    - name: Create Pritunl Web service file from template
      ansible.builtin.template:
        src: pritunl-web.service.j2
        dest: /etc/systemd/system/pritunl-web.service
        mode: '0644'

    - name: Reload systemd and restart Pritunl Web service
      ansible.builtin.systemd:
        name: pritunl-web
        daemon_reload: true
        state: restarted

    - name: Modify MongoDB storage dbPath
      ansible.builtin.lineinfile:
        path: /etc/mongod.conf
        regexp: '^  dbPath:'
        line: '  dbPath: {{ config_pritunl_mongo_db_path | quote }}'
        insertafter: '^storage:'

    - name: Modify MongoDB network bindIp and port
      ansible.builtin.lineinfile:
        path: /etc/mongod.conf
        regexp: '^  bindIp:'
        line: '  bindIp: {{ config_pritunl_mongo_bind_ip | quote }}'
        insertafter: '^net:'

    - name: Modify MongoDB network port
      ansible.builtin.lineinfile:
        path: /etc/mongod.conf
        regexp: '^  port:'
        line: '  port: {{ config_pritunl_mongo_port | quote }}'
        insertafter: '^net:'

    - name: Create pritunl_setup.js script from template
      ansible.builtin.template:
        src: pritunl_setup.js.j2
        dest: /tmp/pritunl_setup.js
        mode: '0644'

    - name: Run pritunl_setup.js script with MongoDB connection details
      ansible.builtin.shell: |
        mongosh < /tmp/pritunl_setup.js
      register: mongo_output
      ignore_errors: true
      changed_when: mongo_output.rc == 0

    - name: Debug MongoDB script execution result
      ansible.builtin.debug:
        var: mongo_output

    - name: Change permissions of MongoDB folder
      ansible.builtin.file:
        path: "{{ config_pritunl_mongo_db_path }}"
        owner: mongodb
        group: mongodb
        mode: '0750'
        recurse: true

    - name: Get Pritunl default admin password
      ansible.builtin.command:
        cmd: "{{ config_pritunl_default_password_command }}"
      register: pritunl_default_password
      changed_when: false

    - name: Show Pritunl default admin password
      ansible.builtin.debug:
        msg: "Pritunl default admin password is: {{ pritunl_default_password.stdout }}"
