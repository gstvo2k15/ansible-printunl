---
# Add required tools for handling keys and repositories
- name: Install gnupg
  ansible.builtin.apt:
    name: gnupg
    state: present

# Add Pritunl GPG key and repository
- name: Add Pritunl GPG key
  ansible.builtin.get_url:
    url: "{{ install_pritunl_gpg_key_url }}"
    dest: "{{ install_pritunl_gpg_keyring }}"
    mode: '0644'

- name: Add Pritunl repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ install_pritunl_gpg_keyring }}] {{ install_pritunl_repo_url }} noble main"
    state: present

# Add MongoDB GPG key and repository
- name: Add MongoDB GPG key
  ansible.builtin.get_url:
    url: "{{ install_mongodb_gpg_key_url }}"
    dest: "{{ install_mongodb_gpg_keyring }}"
    mode: '0644'

- name: Add MongoDB repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ install_mongodb_gpg_keyring }}] {{ install_mongodb_repo_url }}/jammy/mongodb-org/6.0 multiverse"
    state: present

# Update package cache
- name: Update package cache
  ansible.builtin.apt:
    update_cache: true

# Install required packages
- name: Install Pritunl, MongoDB, and WireGuard
  ansible.builtin.apt:
    name:
      - pritunl
      - mongodb-org
      - wireguard
      - wireguard-tools
    state: present

# Disable UFW
- name: Disable UFW
  community.general.ufw:
    state: disabled

# Enable and start services
- name: Enable and start MongoDB and Pritunl
  ansible.builtin.systemd:
    name: "{{ item }}"
